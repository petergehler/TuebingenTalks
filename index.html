<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#a11e3b">
    <meta name="description" content="Swipe through upcoming public talks and events around the University of Tübingen.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css?v=6">
    <title>TübingenTalks</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>TübingenTalks</h1>
        <div class="topbar-actions">
          <button class="icon-button" id="undoButton" type="button" aria-label="Undo last swipe" title="Undo">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 14 4 9l5-5"></path>
              <path d="M4 9h10.5a5.5 5.5 0 1 1 0 11H11"></path>
            </svg>
          </button>
          <button class="icon-button" id="settingsButton" type="button" aria-label="Open settings" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.04.04a2.06 2.06 0 0 1-2.91 2.91l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.56V21a2 2 0 0 1-4 0v-.06A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.04.04a2.06 2.06 0 0 1-2.91-2.91l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1H3a2 2 0 0 1 0-4h.06A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.04-.04a2.06 2.06 0 0 1 2.91-2.91l.04.04A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.56V3a2 2 0 0 1 4 0v.06A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.04-.04a2.06 2.06 0 0 1 2.91 2.91l-.04.04A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1H21a2 2 0 0 1 0 4h-.06A1.7 1.7 0 0 0 19.4 15Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="layout">
        <section class="phone-stage" aria-label="Swipe through events">
          <div class="feed-state">
            <span id="feedStatus">Loading events...</span>
            <span class="progress-track" aria-hidden="true"><span id="progressFill" class="progress-fill"></span></span>
          </div>

          <div class="deck" id="deck">
            <div class="swipe-cue" aria-hidden="true">
              <span>Skip</span>
              <span>Interested</span>
            </div>
            <div id="cardMount"></div>
          </div>
        </section>

        <aside class="side-panel" aria-label="Interested events and source settings">
          <section class="panel">
            <div class="panel-heading">
              <h2>Interested</h2>
              <span id="interestedCount" class="subtle-count">0</span>
            </div>
            <div id="interestedList" class="interested-list"></div>
            <button class="secondary-button panel-action" id="revisitInterestedButton" type="button">Revisit interested</button>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>Sources</h2>
              <button class="text-button" id="allSourcesButton" type="button">All</button>
            </div>
            <div id="sourceChips" class="chip-grid"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog class="settings-dialog" id="settingsDialog" aria-labelledby="settingsTitle">
      <form method="dialog" class="settings-card">
        <div class="settings-header">
          <h2 id="settingsTitle">Settings</h2>
          <button class="icon-button" value="close" type="submit" aria-label="Close settings" title="Close">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>

        <section class="settings-section">
          <h3>Sources</h3>
          <div id="settingsSources" class="settings-list"></div>
        </section>

        <section class="settings-section">
          <h3>Calendar</h3>
          <label class="select-label" for="calendarDefault">Default add action</label>
          <select id="calendarDefault">
            <option value="ics">ICS event</option>
            <option value="google">Google Calendar</option>
            <option value="outlook">Outlook</option>
          </select>
          <p class="settings-note">ICS opens the phone's calendar import flow on most devices. Google and Outlook open their web calendar add screens.</p>
        </section>

        <section class="settings-section">
          <h3>Feed</h3>
          <p class="feed-meta" id="feedMeta">No feed loaded yet.</p>
          <button class="secondary-button" id="revisitSettingsButton" type="button">Revisit interested</button>
          <button class="secondary-button" id="resetButton" type="button">Reset swipes</button>
        </section>
      </form>
    </dialog>

    <template id="eventCardTemplate">
      <article class="swipe-card" id="activeCard">
        <div class="hero-band">
          <img class="event-image" alt="">
          <img class="host-logo-ghost" alt="">
          <div class="hero-copy">
            <h2 class="hero-title"></h2>
            <p class="hero-speaker"></p>
          </div>
        </div>

        <div class="card-body">
          <p class="abstract"></p>

          <div class="bottom-details">
            <div class="bottom-detail">
              <span>Source</span>
              <strong data-field="source"></strong>
            </div>
            <div class="bottom-detail">
              <span>When</span>
              <strong data-field="when"></strong>
            </div>
            <div class="bottom-detail">
              <span>Where</span>
              <strong data-field="where"></strong>
            </div>
          </div>

          <div class="actions">
            <button class="calendar" data-action="calendar-default" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M8 2v4M16 2v4M3 10h18"></path>
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              </svg>
              <span>Add to calendar</span>
            </button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js?v=6" defer></script>
  </body>
</html>
